name: 'Build & Tag'

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    uses: zenhelix/ci-workflows/.github/workflows/app-check.yml@v5
    with:
      java-version: '17'

  create-tag:
    needs: check
    uses: zenhelix/ci-workflows/.github/workflows/gradle-create-tag.yml@v5
    with:
      java-version: '17'
    secrets: inherit
